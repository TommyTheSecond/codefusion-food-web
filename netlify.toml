# Netlify config (alternative to Vercel). Either host works.
[build]
  command = "npm run build"
  publish = "dist"

# SPA fallback: react-router handles routing client-side, so every path
# must serve index.html (otherwise refreshing /dashboard 404s).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Set VITE_API_URL in the Netlify UI (Site settings -> Environment variables)
# to your deployed backend, e.g. https://restaurant-demand-forecasting.onrender.com
